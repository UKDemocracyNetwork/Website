name: Deploy

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: eu-west-2
  DOMAIN: website.dn.womblelabs.co.uk

jobs:
  deploy-dev:
    name: Deploy to dev
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        id: aws
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -f docker/ghost/Dockerfile \
            -t $REGISTRY/dn-website-ghost:$IMAGE_TAG \
            -t $REGISTRY/dn-website-ghost:latest \
            .
          docker push $REGISTRY/dn-website-ghost:$IMAGE_TAG
          docker push $REGISTRY/dn-website-ghost:latest

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install CDK CLI
        run: npm install -g aws-cdk

      - name: Deploy CDK stacks
        env:
          CDK_DEFAULT_ACCOUNT: ${{ steps.aws.outputs.aws-account-id }}
        run: make deploy-dev IMAGE_TAG=${{ github.sha }}

      - name: Invalidate CloudFront cache
        run: |
          DIST_ID=$(aws cloudformation describe-stacks \
            --stack-name CdnStack \
            --region ${{ env.AWS_REGION }} \
            --query "Stacks[0].Outputs[?OutputKey=='DistributionId'].OutputValue" \
            --output text)
          aws cloudfront create-invalidation \
            --distribution-id "$DIST_ID" \
            --paths "/*"

      - name: Run smoke tests
        run: make smoke URL=https://${{ env.DOMAIN }}
