name: CI

on:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Lint
        run: make lint

      - name: Test
        run: make test

      - name: Build Docker image
        run: docker build -f docker/ghost/Dockerfile .
